<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SWF Player</title>

<!-- Load Ruffle -->
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Letterboxed stage container */
#stage {
    aspect-ratio: 4 / 3;          /* CHANGE if your SWF is 16:9 */
    height: 100vh;
    max-width: 100vw;
    background: black;
    overflow: hidden;             /* Critical: clips off-stage elements */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Make player fill stage */
ruffle-player {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>
<div id="stage"></div>

<script>
window.addEventListener("DOMContentLoaded", () => {

    window.RufflePlayer = window.RufflePlayer || {};
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    document.getElementById("stage").appendChild(player);

    player.load({
        url: "fishy.swf",            // <-- your SWF file
        scale: "showAll",           // Letterbox behavior
        backgroundColor: "#000000"
    });

});
</script>

</body>
</html>
